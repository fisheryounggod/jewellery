<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品展示</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--tiffany:#0ABAB5;--ink:#1A1A1A;--muted:#6B6B6B;--line:#E8E8E4;--paper:#FAFAF8;--card:#FFFFFF}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink)}
    .top-bar{height:3px;background:var(--tiffany)}
    header{text-align:center;padding:56px 24px 40px;border-bottom:1px solid var(--line);background:var(--card)}
    .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--tiffany);font-weight:500;margin-bottom:16px}
    h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,5vw,48px);font-weight:400;letter-spacing:.02em}
    .subtitle{margin-top:16px;font-size:14px;color:var(--muted);font-weight:300}
    .rule{width:40px;height:1px;background:var(--tiffany);margin:24px auto 0}
    main{max-width:1280px;margin:0 auto;padding:48px 24px 80px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:32px}
    .card{background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;transition:box-shadow .3s,transform .3s}
    .card:hover{box-shadow:0 12px 40px rgba(0,0,0,.09);transform:translateY(-3px)}
    .card-img{aspect-ratio:1;overflow:hidden;background:#F5F5F3;display:flex;align-items:center;justify-content:center}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
    .card:hover .card-img img{transform:scale(1.04)}
    .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--tiffany);font-size:36px}
    .card-body{padding:20px 20px 24px;display:flex;flex-direction:column;gap:6px;flex:1}
    .card-cat{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--tiffany);font-weight:500}
    .card-name{font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:400;line-height:1.35;margin-top:2px}
    .card-source{font-size:12px;color:var(--muted);font-weight:300}
    .card-price{margin-top:8px;font-size:15px;font-weight:500}
    footer{text-align:center;padding:32px 24px 40px;border-top:1px solid var(--line);background:var(--card)}
    .footer-logo{font-family:'Playfair Display',Georgia,serif;font-size:18px;letter-spacing:.12em;margin-bottom:10px}
    .footer-date{font-size:12px;color:var(--muted);letter-spacing:.06em}
    .footer-rule{width:24px;height:1px;background:var(--tiffany);margin:16px auto 0}
    @media(max-width:600px){.grid{gap:20px}header{padding:36px 20px 28px}main{padding:32px 16px 60px}}
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <header>
    <p class="eyebrow">Product Collection</p>
    <h1>商品展示</h1>
    <p class="subtitle">5 件商品</p>

</body>
</html>
